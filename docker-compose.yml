services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  profile-service:
    build:
      context: .
      dockerfile: ./services/profile-service/Dockerfile
    environment:
      PORT: ${PROFILE_SERVICE_PORT}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${PROFILE_SERVICE_PORT}:4001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4001/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    environment:
      PORT: ${WEB_PORT}
      NEXT_PUBLIC_PROFILE_API_URL: ${NEXT_PUBLIC_PROFILE_API_URL}
    ports:
      - "${WEB_PORT}:3000"
    depends_on:
      profile-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
